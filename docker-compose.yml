services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: assetmgr
      POSTGRES_PASSWORD: assetmgr_pass
      POSTGRES_DB: asset_manager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://assetmgr:assetmgr_pass@db:5432/asset_manager
      SECRET_KEY: change-this-to-a-random-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: >
      sh -c "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  pgdata:
